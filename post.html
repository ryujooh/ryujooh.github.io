<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post | Ryujooh</title>
    
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="css/prism.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="index.html">Ryujooh</a></h1>
            <button id="theme-toggle" title="테마 변경">🌙</button>
        </header>

        <article>
            <header class="post-header">
                <div id="post-meta" class="post-meta"></div>
                <h2 id="post-title" class="post-title">불러오는 중...</h2>
            </header>

            <div id="post-content" class="markdown-body">
                <!-- Content -->
            </div>
        </article>

        <section id="comments" style="margin-top: 5rem;">
            <!-- Giscus -->
        </section>

        <footer>
            <a href="index.html" style="font-size: 0.8rem; font-weight: 200;">← 목록으로 돌아가기</a>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/post-loader.js"></script>

    <!-- ===== 포트폴리오 AI 챗봇 ===== -->
    <script>
      window.ChatWidgetConfig = {
        webhook: {
          url: 'https://ryujooh.app.n8n.cloud/webhook/chat'
        },
        branding: {
          name: 'Portfolio R',
          welcomeText: '안녕하세요! 저에 대해 궁금한 점을 물어보세요 😊',
          responseTimeText: '잠시 후 답변드릴게요'
        },
        style: {
          primaryColor: '#5c6bc0',
          position: 'right'
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/juansebsol/n8n-chatbot-template@latest/chat-widget.js"></script>
</body>
</html>
