<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryujooh</title>
    <meta name="description" content="Ryujooh's personal digital garden.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Prism.js for code highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" id="prism-theme">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <h1 id="blog-title"><a href="index.html">Ryujooh</a></h1>
            <div class="header-actions">
                <a href="admin.html" class="icon-btn" aria-label="Write New Post">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </a>
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
                    <span class="sun-icon">☀️</span>
                    <span class="moon-icon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="search-section">
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Search posts..." aria-label="Search posts">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
            <div id="tag-filters" class="tag-cloud">
                <!-- Tags will be populated here -->
            </div>
        </section>

        <section id="post-list" class="post-grid">
            <div class="loading">Loading posts...</div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Ryujooh. Powered by GitHub Pages.</p>
            <p style="margin-top: 2rem; opacity: 0.3; font-weight: 200; font-size: 0.7rem;">
                <a href="admin.html" style="color: var(--text-color); text-decoration: none;">admin</a>
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
