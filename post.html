<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post | Ryujooh</title>
    
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="css/prism.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="index.html">Ryujooh</a></h1>
            <button id="theme-toggle" title="테마 변경">🌙</button>
        </header>

        <article>
            <header class="post-header">
                <div id="post-meta" class="post-meta"></div>
                <h2 id="post-title" class="post-title">불러오는 중...</h2>
            </header>

            <div id="post-content" class="markdown-body">
                <!-- Content -->
            </div>
        </article>

        <section id="comments" style="margin-top: 5rem;">
            <!-- Giscus -->
        </section>

        <footer>
            <a href="index.html" style="font-size: 0.8rem; font-weight: 200;">← 목록으로 돌아가기</a>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/post-loader.js"></script>

    <!-- ===== n8n 공식 AI 챗봇 ===== -->
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <script type="module">
      import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

      createChat({
        webhookUrl: 'https://ryujooh.app.n8n.cloud/webhook/chat',
        showWelcomeScreen: true,
        initialMessages: [
          '안녕하세요! 데이터 분석가 홍길동의 AI 어시스턴트입니다 😊',
          '프로젝트, 기술 스택, 경력 등에 대해 자유롭게 물어보세요!'
        ],
        i18n: {
          en: {
            getStarted: '대화 시작하기',
            inputPlaceholder: '질문을 입력해주세요...',
          }
        }
      });
    </script>
    <style>
      /* n8n 챗봇 모던 & 심플 디자인 (블루 포인트) */
      :root {
        --chat--color-primary: #3b82f6;      /* 메인 포인트 (블루) */
        --chat--color-background: #ffffff;   /* 창 배경 (화이트) */
        --chat--color-font: #333333;         /* 기본 텍스트 색상 */
        --chat--window--border-radius: 24px; /* 챗봇창 전체 부드러운 라운드 */
        --chat--message--border-radius: 20px;/* 말풍선 라운드 */
      }
      
      /* 헤더 상단의 블랙 배경 제거 및 심플 화이트 처리 */
      div[class*="header"] {
        background-color: #ffffff !important;
        color: #333333 !important;
        border-bottom: 1px solid #f4f4f5 !important;
      }
      div[class*="header"] * {
        color: #333333 !important;
        fill: #333333 !important;
      }

      /* 중간 대화내용의 불필요한 실선 모두 삭제 */
      div[class*="message"] {
        border: none !important;
        box-shadow: none !important;
      }
      
      /* 챗봇 여는 우측 하단 아이콘 블루 & 작게 */
      button[class*="trigger"], button[class*="toggle"] {
        width: 52px !important;
        height: 52px !important;
        background-color: #3b82f6 !important;
        box-shadow: 0 4px 12px rgba(59,130,246,0.3) !important;
      }
      button[class*="trigger"] svg, button[class*="toggle"] svg {
        width: 24px !important;
        height: 24px !important;
        fill: #ffffff !important;
      }

      /* 채팅창 외곽 부드러운 그림자 처리 */
      div[class*="window"] {
        box-shadow: 0 12px 48px rgba(0,0,0,0.12) !important;
        border: none !important;
      }
    </style>
</body>
</html>
