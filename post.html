<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post | Ryujooh</title>
    
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="css/prism.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="index.html">Ryujooh</a></h1>
            <button id="theme-toggle" title="테마 변경">🌙</button>
        </header>

        <article>
            <header class="post-header">
                <div id="post-meta" class="post-meta"></div>
                <h2 id="post-title" class="post-title">불러오는 중...</h2>
            </header>

            <div id="post-content" class="markdown-body">
                <!-- Content -->
            </div>
        </article>

        <section id="comments" style="margin-top: 5rem;">
            <!-- Giscus -->
        </section>

        <footer>
            <a href="index.html" style="font-size: 0.8rem; font-weight: 200;">← 목록으로 돌아가기</a>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/post-loader.js"></script>

    <!-- ===== n8n 공식 AI 챗봇 ===== -->
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <script type="module">
      import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

      createChat({
        webhookUrl: 'https://ryujooh.app.n8n.cloud/webhook/chat',
        showWelcomeScreen: true,
        initialMessages: [
          '안녕하세요! 데이터 분석가 홍길동의 AI 어시스턴트입니다 😊',
          '프로젝트, 기술 스택, 경력 등에 대해 자유롭게 물어보세요!'
        ],
        i18n: {
          en: {
            getStarted: '대화 시작하기',
            inputPlaceholder: '질문을 입력해주세요...',
          }
        }
      });
    </script>
    <style>
      /* n8n 챗봇 미니멀 B&W 점선 디자인 + 블루 포인트 */
      :root {
        --chat--color-primary: #3b82f6;      /* 강조(포인트) 블루 */
        --chat--color-secondary: #000000;    /* 흑백 테마 */
        --chat--color-background: #ffffff;   /* 배경 화이트 */
        --chat--color-font: #111111;         /* 텍스트 블랙 */
        --chat--window--border-radius: 0px;  /* 각진 모서리 (심플) */
      }
      
      /* 모든 챗봇 내부 텍스트 얇게 */
      div[class*="chat"] {
        font-weight: 300 !important;
      }
      
      /* 채팅창 및 버튼 외곽 가는 점선 (블로그 테마 통일) */
      div[class*="chat-window"], 
      button[class*="chat"] {
        border: 1px dotted #333333 !important;
        box-shadow: none !important;
      }
      
      /* 채팅 말풍선 테두리 가는 점선 */
      div[class*="chat-message"] {
        border: 1px dotted #999999 !important;
        background-color: transparent !important;
        color: #111111 !important;
        border-radius: 0px !important;
      }
      
      /* 사용자(내)가 보낸 메시지만 블루 점선으로 강조 */
      div[class*="chat-message"][class*="user"] {
        border: 1px dotted #3b82f6 !important;
      }
    </style>
</body>
</html>
