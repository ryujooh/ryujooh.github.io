<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
        </header>

        <article>
            <header class="post-header">
                <div class="post-meta">{{ page.date | date: "%Y. %m. %d" }} / {{ page.category }}</div>
                <h2 class="post-title">{{ page.title }}</h2>
            </header>

            <div class="content">
                {{ content }}
            </div>
        </article>

        <!-- Management Links -->
        <div class="admin-actions">
            <a href="https://github.com/{{ site.repository }}/edit/{{ site.branch }}/{{ page.path }}" target="_blank">[Edit]</a>
            <a href="https://github.com/{{ site.repository }}/delete/{{ site.branch }}/{{ page.path }}" target="_blank">[Delete]</a>
            <a href="https://github.com/{{ site.repository }}/new/{{ site.branch }}/_posts" target="_blank">[New Post]</a>
        </div>

        <footer>
            <p><a href="{{ site.baseurl }}/" class="post-link" style="font-size: 0.8rem; font-weight: 200;">← List</a></p>
        </footer>
    </div>
</body>
</html>
