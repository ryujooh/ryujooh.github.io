<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryujooh</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="index.html">Ryujooh</a></h1>
            <button id="theme-toggle" title="테마 변경">🌙</button>
        </header>

        <main>
            <!-- 포트폴리오 섹션 -->
            <section class="projects-section">
                <h2 class="section-title">주요 프로젝트</h2>
                <div class="project-grid">
                    <a href="post.html?file=credit-card-churn-analysis.md" class="project-card">
                        <div class="project-image-wrapper">
                            <img src="images/credit-card-churn-analysis-thumbnail.png" alt="신용카드 이탈 고객 분석">
                        </div>
                        <div class="project-info">
                            <h3>신용카드 이탈 고객 분석</h3>
                            <p>1만여 명의 신용카드 고객 데이터를 통해 이탈 고객의 특성과 행동 패턴을 분석하여 비즈니스 개선 인사이트 도출</p>
                        </div>
                    </a>
                    <a href="post.html?file=insta-influencer-efficiency.md" class="project-card">
                        <div class="project-image-wrapper">
                            <img src="images/insta-influencer-efficiency-thumbnail.png" alt="인스타그램 인플루언서 광고 효율성 분석">
                        </div>
                        <div class="project-info">
                            <h3>인스타그램 인플루언서 효율성 분석</h3>
                            <p>인스타그램 인플루언서의 실제 참여율과 팔로워 데이터를 결합해 진짜 광고 효율이 높은 '숨은 진주'를 찾다</p>
                        </div>
                    </a>
                </div>
            </section>

            <section class="search-wrapper">
                <input type="text" id="search-input" placeholder="글 검색...">
            </section>

            <div id="tag-cloud" class="tag-cloud"></div>

            <ul id="post-list" class="post-list">
                <div class="loading">게시글을 불러오는 중...</div>
            </ul>
        </main>

        <footer>
            &copy; 2025 Ryujooh.
        </footer>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
