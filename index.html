<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Static Blog</title>
    <meta name="description" content="A minimalist static blog powered by GitHub Pages and Markdown.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Prism.js for code highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" id="prism-theme">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 id="blog-title"><a href="index.html">My Digital Garden</a></h1>
            <button id="theme-toggle" aria-label="Toggle Dark Mode">
                <span class="sun-icon">☀️</span>
                <span class="moon-icon">🌙</span>
            </button>
        </div>
    </header>

    <main class="container">
        <section id="search-section">
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Search posts..." aria-label="Search posts">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
            <div id="tag-filters" class="tag-cloud">
                <!-- Tags will be populated here -->
            </div>
        </section>

        <section id="post-list" class="post-grid">
            <div class="loading">Loading posts...</div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Modern Static Blog. Powered by GitHub Pages.</p>
            <p style="margin-top: 1rem;"><a href="admin.html" style="color: var(--muted-text); text-decoration: none; font-size: 0.75rem;">Admin Panel</a></p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
