<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | {{ site.title }}</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        #admin-panel { display: none; }
        .login-box { margin-top: 100px; text-align: center; }
        .post-item-admin { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dotted #ccc; padding: 10px 0; }
        .delete-btn { color: red; cursor: pointer; font-size: 0.8rem; border: 1px solid red; padding: 2px 5px; background: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login -->
        <div id="login-section" class="login-box">
            <h1>AUTHENTICATION</h1>
            <input type="password" id="password" placeholder="PASSWORD" style="text-align: center;">
            <br>
            <button onclick="checkPassword()">LOGIN</button>
        </div>

        <!-- Admin Content -->
        <div id="admin-panel">
            <header>
                <h1>ADMIN PANEL</h1>
            </header>

            <section id="config" style="margin-bottom: 5rem; border: 1px solid #000; padding: 20px;">
                <h3 style="margin-bottom: 1rem;">CONFIG</h3>
                <input type="text" id="gh-user" placeholder="GITHUB USERNAME" value="ryujooh">
                <input type="text" id="gh-repo" placeholder="REPOSITORY NAME" value="ryujooh.github.io">
                <input type="password" id="gh-token" placeholder="PERSONAL ACCESS TOKEN">
                <button onclick="saveConfig()">SAVE CONFIG</button>
            </section>

            <section id="new-post">
                <h3>WRITE NEW POST</h3>
                <input type="text" id="post-title" placeholder="TITLE">
                <input type="text" id="post-category" placeholder="CATEGORY">
                <textarea id="post-content" placeholder="CONTENT (MARKDOWN)"></textarea>
                <button id="pub-btn" onclick="publishPost()">PUBLISH</button>
            </section>

            <section id="manage-posts" style="margin-top: 5rem;">
                <h3>MANAGE POSTS</h3>
                <div id="post-list-admin">
                    <p>Loading...</p>
                </div>
            </section>
        </div>
    </div>

    <script>
        function checkPassword() {
            const pass = document.getElementById('password').value;
            if (pass === '7374') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadConfig();
                fetchPostList();
            } else {
                alert('WRONG PASSWORD');
            }
        }

        function loadConfig() {
            document.getElementById('gh-token').value = localStorage.getItem('gh_token_jekyll') || '';
        }

        function saveConfig() {
            const token = document.getElementById('gh-token').value;
            localStorage.setItem('gh_token_jekyll', token);
            alert('CONFIG SAVED');
            fetchPostList();
        }

        async function fetchPostList() {
            const user = document.getElementById('gh-user').value;
            const repo = document.getElementById('gh-repo').value;
            const token = localStorage.getItem('gh_token_jekyll');
            const listDiv = document.getElementById('post-list-admin');

            if (!token) { listDiv.innerHTML = 'Token required'; return; }

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/_posts`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const files = await res.json();
                const posts = files.filter(f => f.name.endsWith('.md'));
                
                listDiv.innerHTML = posts.map(p => `
                    <div class="post-item-admin">
                        <span>${p.name}</span>
                        <button class="delete-btn" onclick="deletePost('${p.name}', '${p.sha}')">DELETE</button>
                    </div>
                `).join('');
            } catch (e) { listDiv.innerHTML = 'Error loading posts'; }
        }

        async function publishPost() {
            const title = document.getElementById('post-title').value;
            const category = document.getElementById('post-category').value;
            const content = document.getElementById('post-content').value;
            const token = localStorage.getItem('gh_token_jekyll');
            const user = document.getElementById('gh-user').value;
            const repo = document.getElementById('gh-repo').value;

            if (!title || !content || !token) { alert('Missing info'); return; }

            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const fileName = `${dateStr}-${title.toLowerCase().replace(/[^a-z0-9]/g, '-')}.md`;
            
            const fileContent = `---
layout: post
title: "${title}"
date: ${dateStr}
category: "${category}"
---

${content}`;

            const btn = document.getElementById('pub-btn');
            btn.disabled = true;
            btn.textContent = 'PUBLISHING...';

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/_posts/${fileName}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Publish post: ${title}`,
                        content: btoa(unescape(encodeURIComponent(fileContent)))
                    })
                });
                if (res.ok) {
                    alert('PUBLISHED SUCCESS');
                    fetchPostList();
                } else { alert('FAILED'); }
            } catch (e) { alert('ERROR'); }
            btn.disabled = false;
            btn.textContent = 'PUBLISH';
        }

        async function deletePost(name, sha) {
            if (!confirm(`DELETE ${name}?`)) return;
            const user = document.getElementById('gh-user').value;
            const repo = document.getElementById('gh-repo').value;
            const token = localStorage.getItem('gh_token_jekyll');

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/_posts/${name}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Delete post: ${name}`,
                        sha: sha
                    })
                });
                if (res.ok) { alert('DELETED'); fetchPostList(); }
            } catch (e) { alert('ERROR'); }
        }
    </script>
</body>
</html>
