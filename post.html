    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <!-- ===== n8n 공식 AI 챗봇 ===== -->
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <div id="n8n-chat-container"></div>
    <script type="module">
      import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

      createChat({
        webhookUrl: 'https://ryujooh.app.n8n.cloud/webhook/chat',
        target: '#n8n-chat-container',
        mode: 'window',
        showWelcomeScreen: true,
        initialMessages: [
          '안녕하세요! 데이터 포트폴리오를 만들어가는 류주현의 AI 어시스턴트입니다 😊',
          '학습 내용, 프로젝트, 기술 스택 등에 대해 자유롭게 물어보세요!'
        ],
        i18n: {
          en: {
            getStarted: '대화 시작하기',
            inputPlaceholder: '질문을 입력해주세요...',
          }
        },
        theme: {
          colors: {
            primary: '#3b82f6',
            accent: '#3b82f6'
          }
        }
      });
    </script>
    <style>
      /* n8n 챗봇 모던 & 심플 디자인 (블루 포인트) - 100% 강제 적용 */
      :root, body, #n8n-chat-container, .chat-window, .chat-button, .n8n-chat, .chat-wrapper, .chat-window-toggle {
        --chat--color-primary: #3b82f6 !important;
        --chat--color-primary-shade-50: #2563eb !important;
        --chat--color-primary-shade-100: #1d4ed8 !important;
        --chat--color-secondary: #ffffff !important;
        --chat--color-secondary-shade-50: #f4f4f5 !important;
        --chat--color-background: #ffffff !important;
        --chat--color-font: #333333 !important;
        --chat--color-light: #ffffff !important;
        --chat--color-dark: #111111 !important;
        --chat--window--border-radius: 24px !important;
        --chat--message--border-radius: 20px !important;
      }
      
      /* 헤더 상단의 블랙 배경 제거 및 심플 화이트 처리 */
      #n8n-chat-container div[class*="header"] {
        background-color: #ffffff !important;
        color: #333333 !important;
        border-bottom: 1px solid #f4f4f5 !important;
      }
      #n8n-chat-container div[class*="header"] * {
        color: #333333 !important;
        fill: #333333 !important;
      }

      /* 중간 대화내용의 불필요한 실선 모두 삭제 */
      #n8n-chat-container div[class*="message"] {
        border: none !important;
        box-shadow: none !important;
      }
      
      /* 챗봇 여는 우측 하단 아이콘 블루 & 작게 */
      .chat-window-toggle, button[class*="trigger"], button[class*="toggle"], button[class*="chat-button"], #n8n-chat-container button {
        width: 52px !important;
        height: 52px !important;
        background-color: #3b82f6 !important;
        box-shadow: 0 4px 12px rgba(59,130,246,0.3) !important;
      }
      .chat-window-toggle svg, button[class*="trigger"] svg, button[class*="toggle"] svg, button[class*="chat-button"] svg, #n8n-chat-container button svg {
        width: 24px !important;
        height: 24px !important;
        fill: #ffffff !important;
      }

      /* 채팅창 외곽 부드러운 그림자 처리 */
      #n8n-chat-container div[class*="window"] {
        box-shadow: 0 12px 48px rgba(0,0,0,0.12) !important;
        border: none !important;
      }
    </style>
</body>
</html>
