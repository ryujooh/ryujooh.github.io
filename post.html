<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Title | Ryujooh</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Prism.js for code highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" id="prism-theme">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <h1 id="blog-title"><a href="index.html">Ryujooh</a></h1>
            <div class="header-actions">
                <a href="admin.html" class="icon-btn" aria-label="Write New Post">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </a>
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
                    <span class="sun-icon">☀️</span>
                    <span class="moon-icon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <article class="post-detail">
            <nav class="breadcrumb">
                <a href="index.html">← Back to list</a>
            </nav>
            <header class="post-header">
                <h1 id="post-title" class="loading">Loading...</h1>
                <div class="post-meta-wrapper">
                    <div class="post-meta">
                        <span id="post-date"></span>
                        <div id="post-tags" class="tag-list"></div>
                    </div>
                    <div class="post-admin-actions" id="admin-controls" style="display: none;">
                        <button onclick="editThisPost()" class="action-link">Edit</button>
                        <button onclick="deleteThisPost()" class="action-link delete">Delete</button>
                    </div>
                </div>
            </header>
            <div id="post-content" class="markdown-body">
                <!-- Markdown content will be rendered here -->
            </div>
        </article>

        <section class="comments">
            <div id="giscus-container"></div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Ryujooh. Powered by GitHub Pages.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/post-loader.js"></script>
</body>
</html>
